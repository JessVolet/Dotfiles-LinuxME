# Generated by Matugen - Mako notifications theme
font=JetBrains Mono 10

background-color={{colors.surface_container.default.hex}}
text-color={{colors.on_surface.default.hex}}
border-color={{colors.primary.default.hex}}
progress-color=over {{colors.primary_container.default.hex}}

border-size=2
border-radius=0
padding=14
default-timeout=5000

anchor=top-right
margin=20

[urgency=low]
default-timeout=3000
border-color={{colors.outline.default.hex}}

[urgency=normal]
default-timeout=5000
border-color={{colors.primary.default.hex}}

[urgency=high]
default-timeout=0
border-color={{colors.error.default.hex}}
text-color={{colors.on_error.default.hex}}
background-color={{colors.error_container.default.hex}}
